<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Word Maker</title>

<style>
  * { box-sizing: border-box; font-family: system-ui, sans-serif; }
  body {
    margin: 0;
    background: radial-gradient(circle at top, #2f80ed, #0f172a);
    color: #f9fafb;
    overflow: hidden;
  }

  /* HOME SCREEN */
  #homeScreen {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at top, #2f80ed, #0f172a);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }

  .home-title { font-size: 70px; font-weight: 800; margin-bottom: 20px; }
  .home-sub { font-size: 20px; opacity: 0.9; margin-bottom: 30px; }

  .btn {
    padding: 14px 32px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #1d4ed8;
    color: white;
    font-weight: 600;
    transition: 0.2s;
  }
  .btn:hover { background: #2563eb; transform: translateY(-2px); }

  /* GAME CONTAINER */
  #gameContainer {
    position: fixed;
    inset: 0;
    display: none;
    padding: 30px;
    overflow-y: auto;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .game-card {
    width: 80vw;
    max-width: 1600px;
    background: rgba(15, 23, 42, 0.96);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.6);
  }

  /* TOP BAR */
  .top-bar {
    display: flex;
    justify-content: space-between;
    font-size: 32px;
    margin-bottom: 20px;
  }

  .stat-label { font-size: 14px; opacity: 0.7; text-transform: uppercase; }

  .timer { color: #fbbf24; font-weight: 700; }
  .score { color: #34d399; font-weight: 700; }

  /* BOARD */
  .board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 14px;
    margin-bottom: 20px;
  }

  .tile {
    background: linear-gradient(145deg, #1f2937, #111827);
    border-radius: 12px;
    height: 80px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 34px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.1s;
    box-shadow: 0 5px 0 #020617;
  }

  .tile:hover:not(.used) {
    transform: translateY(-3px);
    background: #1f2937;
    box-shadow: 0 7px 0 #020617;
  }

  .tile.used {
    opacity: 0.3;
    cursor: default;
    transform: translateY(2px);
    box-shadow: 0 2px 0 #020617;
  }

  /* CURRENT WORD */
  .current-word-box {
    background: #020617;
    padding: 16px;
    border-radius: 12px;
    font-size: 32px;
    letter-spacing: 0.18em;
    margin-bottom: 10px;
    border: 1px solid #1f2937;
  }

  .message { min-height: 20px; font-size: 16px; opacity: 0.8; }
  .message.good { color: #34d399; }
  .message.bad { color: #f87171; }

  /* WORD LIST */
  .word-list {
    background: #020617;
    padding: 16px;
    border-radius: 12px;
    border: 1px solid #1f2937;
    max-height: 260px;
    overflow-y: auto;
    margin-top: 20px;
  }

  .word-item {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #111827;
    font-size: 18px;
  }

  .word-item:last-child { border-bottom: none; }

  /* GAME OVER */
  #gameOver {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
  }

  .game-over-card {
    background: #111827;
    padding: 30px;
    border-radius: 16px;
    width: 400px;
    text-align: center;
  }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="homeScreen">
  <div class="home-title">Word Maker</div>
  <div class="home-sub">Build as many words as you can in 60 seconds.</div>
  <button id="startGameBtn" class="btn">Play</button>
</div>

<!-- GAME SCREEN -->
<div id="gameContainer">
  <div class="game-card">

    <div class="top-bar">
      <div>
        <div class="stat-label">Time</div>
        <div class="timer" id="timer">60</div>
      </div>

      <div class="title">Word Maker</div>

      <div>
        <div class="stat-label">Score</div>
        <div class="score" id="score">0</div>
      </div>
    </div>

    <div class="board" id="board"></div>

    <div class="current-word-box" id="currentWord"></div>
    <div class="message" id="message"></div>

    <button class="btn" id="submitBtn">Submit</button>
    <button class="btn" id="clearBtn" style="background:#374151;margin-left:10px;">Clear</button>

    <div class="word-list" id="wordList"></div>

  </div>
</div>

<!-- GAME OVER -->
<div id="gameOver">
  <div class="game-over-card">
    <h2>Time's Up!</h2>
    <p>Score: <span id="finalScore"></span></p>
    <p>Best: <span id="bestScore"></span></p>
    <p>Words: <span id="finalWords"></span></p>
    <p>Longest: <span id="longestWord"></span></p>
    <button class="btn" id="playAgainBtn">Play Again</button>
  </div>
</div>

  /* LETTERS */
  function randomLetter() {
    return LETTERS[Math.floor(Math.random() * LETTERS.length)];
  }

  function generateBoard() {
    tiles = [];
    used = [];
    for (let i = 0; i < BOARD_SIZE; i++) tiles.push(randomLetter());
    renderBoard();
  }

  function renderBoard() {
    boardEl.innerHTML = "";
    tiles.forEach((letter, i) => {
      const div = document.createElement("div");
      div.className = "tile";
      if (used.includes(i)) div.classList.add("used");
      div.textContent = letter;
      div.onclick = () => selectTile(i);
      boardEl.appendChild(div);
    });
  }

  function selectTile(i) {
    if (used.includes(i)) return;
    used.push(i);
    currentWord += tiles[i];
    currentWordEl.textContent = currentWord;
    renderBoard();
  }

  /* WORD LOGIC */
  function submitWord() {
    if (!dictionaryLoaded) {
      messageEl.textContent = "Dictionary loading… try again.";
      messageEl.className = "message bad";
      return;
    }

    const w = currentWord.toLowerCase();

    if (w.length < 3) {
      messageEl.textContent = "Word must be at least 3 letters.";
      messageEl.className = "message bad";
      return;
    }

    if (!DICTIONARY.has(w)) {
      messageEl.textContent = `"${currentWord}" is not a valid word.`;
      messageEl.className = "message bad";
      return;
    }

    if (words.includes(w)) {
      messageEl.textContent = "You already used that word.";
      messageEl.className = "message bad";
      return;
    }

    const pts = currentWord.length * 2;
    score += pts;
    scoreEl.textContent = score;

    const item = document.createElement("div");
    item.className = "word-item";
    item.innerHTML = `<span>${currentWord}</span><span>+${pts}</span>`;
    wordListEl.prepend(item);

    words.push(w);

    messageEl.textContent = `+${pts} points`;
    messageEl.className = "message good";

    currentWord = "";
    used = [];
    currentWordEl.textContent = "";
    renderBoard();
  }

  function clearWord() {
    currentWord = "";
    used = [];
    currentWordEl.textContent = "";
    messageEl.textContent = "";
    renderBoard();
  }

  /* TIMER */
  function startTimer() {
    timerInterval = setInterval(() => {
      timeLeft--;
      timerEl.textContent = timeLeft;
      if (timeLeft <= 0) endGame();
    }, 1000);
  }

  /* END GAME */
  function endGame() {
    clearInterval(timerInterval);

    finalScoreEl.textContent = score;
    finalWordsEl.textContent = words.length;
    longestWordEl.textContent = words.reduce((a,b)=>b.length>a.length?b:a,"") || "—";

    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem("wm_best", bestScore);
    }

    bestScoreEl.textContent = bestScore;

    gameOver.style.display = "flex";
  }

  /* RESET */
  function resetGame() {
    score = 0;
    timeLeft = ROUND_TIME;
    words = [];
    scoreEl.textContent = 0;
    timerEl.textContent = ROUND_TIME;
    wordListEl.innerHTML = "";
    currentWord = "";
    currentWordEl.textContent = "";
    messageEl.textContent = "";

    generateBoard();
    startTimer();
  }

  /* BUTTONS */
  document.getElementById("startGameBtn").onclick = () => {
    homeScreen.style.display = "none";
    gameContainer.style.display = "flex";
    resetGame();
  };

  document.getElementById("submitBtn").onclick = submitWord;
  document.getElementById("clearBtn").onclick = clearWord;
  document.getElementById("playAgainBtn").onclick = () => {
    gameOver.style.display = "none";
    resetGame();
  };

  /* KEYBOARD SUPPORT */
  document.addEventListener("keydown", (e) => {
    if (gameContainer.style.display !== "flex") return;

    if (e.key === "Enter") submitWord();
    if (e.key === "Backspace") clearWord();

    const key = e.key.toUpperCase();
    if (key >= "A" && key <= "Z") {
      const idx = tiles.findIndex((l, i) => l === key && !used.includes(i));
      if (idx !== -1) selectTile(idx);
    }
  });
</script>

</body>
</html>
